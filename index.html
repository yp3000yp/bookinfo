<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📚 교과서 채택 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F3EE;
  --white: #FFFFFF;
  --navy: #1C2B3A;
  --navy-lt: #2E4057;
  --accent: #E8562A;
  --accent2: #2A8CBB;
  --accent3: #2DAA6A;
  --text: #1C2B3A;
  --muted: #7A8C9A;
  --border: rgba(28,43,58,0.12);
  --pill-bg: #F0EDE7;
  --card-radius: 16px;
  --font: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 20px 20px 0;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(232,86,42,0.15);
  pointer-events: none;
}
.header-tag {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 4px 10px;
  border-radius: 4px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.header h1 {
  color: #fff;
  font-size: 1.35rem;
  font-weight: 900;
  line-height: 1.25;
  margin-bottom: 6px;
}
.header-sub {
  color: rgba(255,255,255,0.55);
  font-size: 12px;
  margin-bottom: 20px;
}
.header-wave {
  display: block;
  width: calc(100% + 2px);
  margin-left: -1px;
  margin-bottom: -2px;
}

/* ── SEARCH SECTION ── */
.search-section {
  padding: 20px 16px 12px;
}
.search-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.school-scroll {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.school-chip {
  background: var(--white);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.18s ease;
  white-space: nowrap;
  min-height: 44px;
  display: flex; align-items: center;
}
.school-chip:active { transform: scale(0.96); }
.school-chip.active {
  background: var(--navy);
  border-color: var(--navy);
  color: #fff;
  font-weight: 700;
}

.search-row {
  display: flex; gap: 8px;
}
.search-input {
  flex: 1;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  padding: 12px 16px;
  font-size: 15px;
  font-family: var(--font);
  outline: none;
  min-height: 48px;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent2); }
.search-input::placeholder { color: #B5C0CA; }
.clear-btn {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--muted);
  padding: 12px 16px;
  font-size: 14px;
  font-family: var(--font);
  cursor: pointer;
  white-space: nowrap;
  min-height: 48px;
  transition: all 0.15s;
}
.clear-btn:active { background: #f8f0f0; border-color: var(--accent); color: var(--accent); }

/* ── NO RESULT ── */
.no-result {
  display: none;
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.no-result-icon { font-size: 2.5rem; margin-bottom: 10px; }

/* ── RESULT ── */
#result { display: none; padding: 0 16px 32px; }

.school-hero {
  background: var(--navy);
  border-radius: var(--card-radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.school-hero::after {
  content: '📚';
  position: absolute;
  right: 20px; top: 50%;
  transform: translateY(-50%);
  font-size: 2.8rem;
  opacity: 0.2;
}
.school-hero-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.school-hero-name {
  color: #fff;
  font-size: 1.5rem;
  font-weight: 900;
}
.school-hero-sub {
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  margin-top: 4px;
}

/* ── GRADE TABS ── */
.grade-tabs {
  display: flex;
  background: var(--white);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 16px;
  border: 1.5px solid var(--border);
}
.grade-tab {
  flex: 1;
  background: transparent;
  border: none;
  border-radius: 9px;
  color: var(--muted);
  padding: 10px 4px;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.18s;
  min-height: 44px;
}
.grade-tab.active {
  background: var(--navy);
  color: #fff;
}

/* ── SUBJECT CARDS ── */
.grade-panel { display: none; }
.grade-panel.active { display: block; }

.subject-list { display: flex; flex-direction: column; gap: 10px; }
.subject-card {
  background: var(--white);
  border-radius: var(--card-radius);
  border: 1.5px solid var(--border);
  overflow: hidden;
  display: flex;
  align-items: stretch;
  min-height: 72px;
}
.subject-stripe {
  width: 6px;
  flex-shrink: 0;
}
.subject-inner {
  flex: 1;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.subject-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.6px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.pub-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.pub-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.pub-name {
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.2;
}
.pub-author {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  padding-left: 18px;
}
.pub-empty {
  font-size: 14px;
  color: #C5D0D8;
  font-style: italic;
}

/* ── SUMMARY TABLE ── */
.summary-section { margin-top: 24px; }
.section-heading {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.summary-card {
  background: var(--white);
  border-radius: var(--card-radius);
  border: 1.5px solid var(--border);
  overflow: hidden;
}
.sum-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.sum-table th {
  background: var(--navy);
  color: rgba(255,255,255,0.7);
  padding: 10px 12px;
  text-align: left;
  font-weight: 700;
  font-size: 12px;
  white-space: nowrap;
}
.sum-table th:first-child { color: rgba(255,255,255,0.5); width: 80px; }
.sum-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  font-size: 12px;
}
.sum-table tr:last-child td { border-bottom: none; }
.sum-table tr:nth-child(even) td { background: var(--bg); }
.sum-table td:first-child { font-weight: 700; color: var(--muted); font-size: 11px; white-space: nowrap; }
.sum-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
}
.sum-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sum-name { font-weight: 700; }
.sum-auth { font-size: 11px; color: var(--muted); }

/* ── LEGEND ── */
.legend-section {
  background: var(--white);
  border-radius: var(--card-radius);
  border: 1.5px solid var(--border);
  padding: 16px;
  margin-top: 16px;
}
.legend-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.legend-item {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 13px;
  font-weight: 500;
}
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* ── FOOTER ── */
.footer {
  background: var(--navy);
  color: rgba(255,255,255,0.4);
  font-size: 11px;
  text-align: center;
  padding: 16px;
  margin-top: 32px;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeUp 0.28s ease both; }
</style>
</head>

const grades = ["1학년","2학년","3학년"];
const allSchools = gradeData["1학년"].schools;

function getPubKey(val) {
  if (!val || val === "—") return null;
  const clean = val.includes(":") ? val.split(":")[1] : val;
  const m = clean.match(/^([^\(]+)/);
  const raw = m ? m[1].trim() : clean.trim();
  for (const key of Object.keys(pubColors)) {
    if (raw.startsWith(key)) return key;
  }
  return raw;
}
function getPubName(val) { return getPubKey(val); }
function getAuthor(val) {
  if (!val || val === "—") return "";
  const clean = val.includes(":") ? val.split(":")[1] : val;
  const m = clean.match(/\((.+)\)/);
  return m ? m[1] : "";
}
function getColor(val) {
  const k = getPubKey(val);
  if (!k) return "#BBBBBB";
  return pubColors[k] || "#5D6D7E";
}

// Build school buttons
const schoolGrid = document.getElementById("schoolGrid");
allSchools.forEach(school => {
  const btn = document.createElement("button");
  btn.className = "school-chip";
  btn.textContent = school;
  btn.dataset.school = school;
  btn.onclick = () => selectSchool(school);
  schoolGrid.appendChild(btn);
});

// Build legend
const legendGrid = document.getElementById("legendGrid");
Object.entries(pubColors).forEach(([pub, color]) => {
  const el = document.createElement("div");
  el.className = "legend-item";
  el.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${pub}`;
  legendGrid.appendChild(el);
});

// Search input
document.getElementById("searchInput").addEventListener("input", function() {
  const v = this.value.trim();
  if (!v) { document.getElementById("result").style.display="none"; document.getElementById("noResult").style.display="none"; return; }
  const match = allSchools.find(s => s.includes(v));
  if (match) selectSchool(match);
  else {
    document.getElementById("result").style.display = "none";
    document.getElementById("noResult").style.display = "block";
  }
});

let currentTab = 0;
function switchTab(idx) {
  currentTab = idx;
  grades.forEach((_, i) => {
    document.getElementById(`tab${i}`).classList.toggle("active", i === idx);
    document.getElementById(`grade${i}`).classList.toggle("active", i === idx);
  });
}

function selectSchool(school) {
  document.querySelectorAll(".school-chip").forEach(b => b.classList.toggle("active", b.dataset.school === school));
  document.getElementById("searchInput").value = school;
  document.getElementById("noResult").style.display = "none";
  document.getElementById("result").style.display = "block";
  document.getElementById("resultSchoolName").textContent = school;

  grades.forEach((grade, gi) => {
    const { schools, subjects, rows } = gradeData[grade];
    const si = schools.indexOf(school);
    const panel = document.getElementById(`grade${gi}`);

    let html = '<div class="subject-list animate-in">';
    subjects.forEach((subj, ri) => {
      const val = si >= 0 ? (rows[ri][si] || "—") : "—";
      const pub   = getPubName(val);
      const auth  = getAuthor(val);
      const color = getColor(val);
      const isEmpty = !pub || val === "—";
      let prefix = "";
      if (val.includes(":")) prefix = val.split(":")[0] + " · ";

      html += `
        <div class="subject-card">
          <div class="subject-stripe" style="background:${isEmpty ? '#E0E8F0' : color}"></div>
          <div class="subject-inner">
            <div class="subject-name">${subj}</div>
            ${isEmpty
              ? `<span class="pub-empty">미채택</span>`
              : `<div class="pub-row">
                   <span class="pub-dot" style="background:${color}"></span>
                   <span class="pub-name" style="color:${color}">${prefix}${pub}</span>
                 </div>
                 ${auth ? `<div class="pub-author">${auth}</div>` : ''}`
            }
          </div>
        </div>`;
    });
    html += '</div>';
    panel.innerHTML = html;
  });

  // Summary table
  const allSubjects = [];
  grades.forEach(g => gradeData[g].subjects.forEach(s => { if (!allSubjects.includes(s)) allSubjects.push(s); }));

  let tbl = `<table class="sum-table">
    <thead><tr><th>과목</th>${grades.map(g=>`<th>${g}</th>`).join('')}</tr></thead>
    <tbody>`;

  allSubjects.forEach(subj => {
    tbl += `<tr><td>${subj}</td>`;
    grades.forEach(grade => {
      const { schools, subjects, rows } = gradeData[grade];
      const si = schools.indexOf(school);
      const ri = subjects.indexOf(subj);
      if (ri < 0) { tbl += `<td style="color:#C5D0D8">—</td>`; return; }
      const val = si >= 0 ? (rows[ri][si] || "—") : "—";
      const pub   = getPubName(val);
      const auth  = getAuthor(val);
      const color = getColor(val);
      const isEmpty = !pub || val === "—";
      let prefix = "";
      if (val.includes(":")) prefix = val.split(":")[0] + " · ";

      tbl += isEmpty
        ? `<td style="color:#C5D0D8">—</td>`
        : `<td><div class="sum-pill" style="background:${color}18; border-left:3px solid ${color}; border-radius:0">
               <span class="sum-dot" style="background:${color}"></span>
               <span class="sum-name" style="color:${color}">${prefix}${pub}</span>
             </div></td>`;
    });
    tbl += `</tr>`;
  });

  tbl += `</tbody></table>`;
  document.getElementById("summaryTable").innerHTML = tbl;

  switchTab(0);
  window.scrollTo({ top: document.getElementById("result").offsetTop - 16, behavior: "smooth" });
}

function clearSelection() {
  document.querySelectorAll(".school-chip").forEach(b => b.classList.remove("active"));
  document.getElementById("searchInput").value = "";
  document.getElementById("result").style.display = "none";
  document.getElementById("noResult").style.display = "none";
}
</script>
