name: 📚 교과서 데이터 자동 배포

on:
  push:
    branches: [ main, master ]
    paths:
      - 'data.json'      # data.json 변경 시에만 실행
      - 'index.html'     # index.html 변경 시에도 실행

  # 수동 실행 허용 (GitHub Actions 탭에서 Run workflow 버튼)
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    # 동시 배포 방지 (한 번에 1개만 실행)
    concurrency:
      group: pages
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 🔍 data.json 유효성 검사
        run: |
          echo "data.json 파싱 검사..."
          python3 -c "
          import json, sys
          try:
              with open('data.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
              years = list(data.get('years', {}).keys())
              print(f'✅ 유효한 JSON — 연도: {years}')
          except Exception as e:
              print(f'❌ JSON 오류: {e}')
              sys.exit(1)
          "

      - name: 📄 배포 파일 목록 확인
        run: |
          echo "배포할 파일들:"
          ls -lh *.html *.json 2>/dev/null || echo "(루트에 없음)"

      - name: ⚙️ GitHub Pages 설정
        uses: actions/configure-pages@v4

      - name: 📦 배포 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          # 저장소 루트 전체를 배포 (필요 시 특정 폴더로 변경)
          path: '.'

      - name: 🚀 GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ 배포 완료 알림
        run: |
          echo "======================================="
          echo "✅ 배포 완료!"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
          echo "시각: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S') KST"
          echo "======================================="
